<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SF Scraper Monitor</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header>
      <h1>
        SF Scraper Monitor
        <div id="loading" class="spinner" hidden></div>
      </h1>
      <div class="meta">
        <span id="data-root"></span>
        <span id="generated-at"></span>
      </div>
    </header>

    <section class="rate">
      <div class="stat">
        <span class="label">Cases in last hour</span>
        <span class="value" id="rate-hour">—</span>
      </div>
      <div class="stat">
        <span class="label">Cases in last 24h</span>
        <span class="value" id="rate-24h">—</span>
      </div>
      <div class="stat">
        <span class="label">Cases in last 7d</span>
        <span class="value" id="rate-7d">—</span>
      </div>
      <div class="stat">
        <span class="label">Last activity</span>
        <span class="value" id="last-activity">—</span>
      </div>
    </section>

    <section class="totals" id="totals"></section>

    <section class="legend">
      <span class="swatch complete"></span> complete
      <span class="swatch in-progress"></span> in progress
      <span class="swatch has-failures"></span> has failures
      <span class="swatch pending"></span> pending
      <span class="swatch no-cases"></span> zero cases
      <span class="swatch untouched"></span> untouched
    </section>

    <section id="calendar"></section>

    <div id="tooltip" class="tooltip" hidden></div>

    <script src="app.js"></script>
  </body>
</html>
